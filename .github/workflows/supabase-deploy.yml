name: Supabase Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 20

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: website-artifact
          path: dist

  deploy_pages:
    name: Deploy Frontend to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with:
          name: website-artifact
          path: dist
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v1
        with:
          path: dist
      - uses: actions/deploy-pages@v2

  deploy_supabase:
    name: Deploy Supabase
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Supabase CLI
        run: npm install -g supabase@latest
      - name: Authenticate Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not set"
            exit 1
          fi
          supabase login --no-browser --token "$SUPABASE_ACCESS_TOKEN"
      - name: Link Supabase project
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF is not set"
            exit 1
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Run admin-repair SQL (restore admin access)
        run: |
          if [ -f supabase/scripts/repair_admin_access.sql ]; then
            supabase db query --file supabase/scripts/repair_admin_access.sql
          else
            echo "repair_admin_access.sql not found"
            exit 1
          fi
      - name: Deploy database schema
        run: supabase db push
      - name: Deploy admin Edge Function
        run: supabase functions deploy admin-users
